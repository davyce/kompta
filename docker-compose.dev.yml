version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: kompta_backend_dev
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=sqlite:///./kompta.db
      - SECRET_KEY=dev-secret-kompta-2024
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3001,http://127.0.0.1:3001
      - SEED_DEMO=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload

  frontend:
    image: node:20-alpine
    container_name: kompta_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:8010
    command: sh -c "npm ci --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
