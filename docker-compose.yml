services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kompta
      POSTGRES_USER: kompta
      POSTGRES_PASSWORD: kompta
    ports:
      - "5432:5432"
    volumes:
      - kompta_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  kompta_postgres:
