services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kompta_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./kompta.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@kompta.app}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-KOMPTA}
      - SEED_DEMO=${SEED_DEMO:-true}
    volumes:
      - kompta_storage:/app/storage
      - kompta_db:/app  # pour SQLite en mode simple
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kompta_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kompta_storage:
  kompta_db:
  kompta_postgres:
