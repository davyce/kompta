services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kompta_backend
    restart: unless-stopped
    environment:
      # SQLite persistÃĐ dans le volume storage (PAS dans /app, sinon le volume
      # masquerait le code de l'image et les dÃĐploiements seraient ignorÃĐs).
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/storage/kompta.db}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set â never use default in production}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - MOMO_SUBSCRIPTION_KEY=${MOMO_SUBSCRIPTION_KEY:-}
      - MOMO_API_USER=${MOMO_API_USER:-}
      - MOMO_API_KEY=${MOMO_API_KEY:-}
      - MOMO_TARGET_ENVIRONMENT=${MOMO_TARGET_ENVIRONMENT:-sandbox}
      - MOMO_CALLBACK_SECRET=${MOMO_CALLBACK_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@kompta.app}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-KOMPTA}
      - SEED_DEMO=${SEED_DEMO:-false}
    volumes:
      - kompta_storage:/app/storage
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kompta_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kompta_storage:
