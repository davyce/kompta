name: Kompta
options:
  bundleIdPrefix: com.adansonia
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "264EZSM3VZ"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    OTHER_SWIFT_FLAGS: ""

targets:
  # ── iOS app ──────────────────────────────────────────────────────────────
  Kompta:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "Info-macOS.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adansonia.kompta
        PRODUCT_NAME: KOMPTA
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: KOMPTA
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        # Chiffrement standard uniquement (HTTPS) → exempté, pas de question export.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # Scan de QR/code-barres produit (Caisse / Inventaire).
        NSCameraUsageDescription: "KOMPTA utilise la caméra pour scanner les codes-barres et QR codes de vos produits."
        # Autorise uniquement les hôtes du réseau local (localhost, *.local) en
        # clair — n'affaiblit pas la sécurité prod (HTTP internet reste bloqué).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad : Apple impose les 4 orientations (multitâche).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  # ── macOS app ─────────────────────────────────────────────────────────────
  KomptaMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "Info-macOS.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adansonia.kompta.mac
        PRODUCT_NAME: KOMPTA
        INFOPLIST_FILE: Sources/Info-macOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info-macOS.plist
      properties:
        CFBundleDisplayName: KOMPTA
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "6"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Adansonia"
        ITSAppUsesNonExemptEncryption: false
        # Catégorie App Store (obligatoire pour le Mac App Store).
        LSApplicationCategoryType: "public.app-category.business"
        # Scan QR/code-barres (si utilisé sur Mac avec caméra).
        NSCameraUsageDescription: "KOMPTA utilise la caméra pour scanner les codes-barres et QR codes de vos produits."
    entitlements:
      path: Sources/KomptaMac.entitlements
      properties:
        # App Sandbox obligatoire pour le Mac App Store.
        com.apple.security.app-sandbox: true
        # Appels à l'API backend (HTTPS).
        com.apple.security.network.client: true
        # Imports CSV et téléchargements via fileImporter/exporter.
        com.apple.security.files.user-selected.read-write: true
