name: Kompta
options:
  bundleIdPrefix: com.adansonia
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "264EZSM3VZ"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    OTHER_SWIFT_FLAGS: ""

packages:
  StripeApplePay:
    url: https://github.com/stripe/stripe-ios
    from: 24.1.0
  StripeTerminal:
    url: https://github.com/stripe/stripe-terminal-ios
    from: 5.0.0

targets:
  # ── iOS app ──────────────────────────────────────────────────────────────
  Kompta:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "Info-macOS.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adansonia.kompta
        PRODUCT_NAME: KOMPTA
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: KOMPTA
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "8"
        # Chiffrement standard uniquement (HTTPS) → exempté, pas de question export.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # Scan de QR/code-barres produit (Caisse / Inventaire).
        NSCameraUsageDescription: "KOMPTA utilise la caméra pour scanner les codes-barres et QR codes de vos produits."
        # Autorise uniquement les hôtes du réseau local (localhost, *.local) en
        # clair — n'affaiblit pas la sécurité prod (HTTP internet reste bloqué).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Tap to Pay on iPhone (StripeTerminal, lecteur "local mobile") : la
        # localisation approximative est exigée par les réseaux de cartes pour
        # la conformité PCI (géolocaliser la transaction), et Bluetooth est
        # utilisé par le SDK pour la découverte de lecteurs externes optionnels.
        NSLocationWhenInUseUsageDescription: "KOMPTA a besoin de votre position pour valider les paiements par carte sans contact (Tap to Pay), conformément aux exigences des réseaux de cartes."
        NSBluetoothAlwaysUsageDescription: "KOMPTA utilise le Bluetooth pour détecter un lecteur de carte externe, si vous en connectez un."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad : Apple impose les 4 orientations (multitâche).
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sources/Kompta.entitlements
      properties:
        # Apple Pay (POS) — merchant ID PLACEHOLDER : à remplacer par un vrai
        # Merchant ID créé par l'utilisateur dans son compte Apple Developer,
        # puis activer la capacité "Apple Pay" dans les Signing & Capabilities
        # Xcode de la cible Kompta (nécessite le compte développeur du client).
        com.apple.developer.in-app-payments:
          - merchant.com.adansonia.kompta
        # Tap to Pay on iPhone — entitlement à valider par Apple (demande
        # via le compte développeur, cf. TapToPayCheckout.swift). Sans cette
        # approbation, StripeTerminal.discoverReaders(.localMobile) échoue
        # au runtime même avec cette clé présente dans le binaire.
        #
        # TEMPORAIREMENT DÉSACTIVÉ (commenté) : tant que la demande n'est pas
        # approuvée par Apple, cet entitlement bloque la signature de TOUT
        # build sur un vrai appareil (pas seulement Xcode Cloud). Décommenter
        # dès que la demande est approuvée (voir historique de conversation),
        # puis relancer `xcodegen generate`.
        # com.apple.developer.proximity-reader.payment.acceptance: true
    dependencies:
      - package: StripeApplePay
      - package: StripeTerminal

  # ── macOS app ─────────────────────────────────────────────────────────────
  KomptaMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "Info-macOS.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adansonia.kompta.mac
        PRODUCT_NAME: KOMPTA
        INFOPLIST_FILE: Sources/Info-macOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info-macOS.plist
      properties:
        CFBundleDisplayName: KOMPTA
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "8"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Adansonia"
        ITSAppUsesNonExemptEncryption: false
        # Catégorie App Store (obligatoire pour le Mac App Store).
        LSApplicationCategoryType: "public.app-category.business"
        # Scan QR/code-barres (si utilisé sur Mac avec caméra).
        NSCameraUsageDescription: "KOMPTA utilise la caméra pour scanner les codes-barres et QR codes de vos produits."
    entitlements:
      path: Sources/KomptaMac.entitlements
      properties:
        # App Sandbox obligatoire pour le Mac App Store.
        com.apple.security.app-sandbox: true
        # Appels à l'API backend (HTTPS).
        com.apple.security.network.client: true
        # Imports CSV et téléchargements via fileImporter/exporter.
        com.apple.security.files.user-selected.read-write: true
        # NOTE : Apple Pay via le SDK Stripe (StripeApplePay) n'est disponible
        # que sur iOS — le package stripe-ios ne déclare pas de support macOS
        # (cf. Package.swift : platforms: [.iOS(.v13)]). Pas de dépendance ni
        # de capacité Apple Pay ajoutée ici ; KomptaMac garde le paiement carte
        # web/manuel existant. Si Apple ajoute un jour le support macOS natif
        # au SDK Stripe, ce commentaire pourra être remplacé par la même
        # config que la cible Kompta (iOS) ci-dessus.

schemes:
  # Active la config StoreKit Testing locale (Kompta.storekit) sur le schéma
  # iOS, pour tester les achats intégrés en simulateur SANS produits réels
  # App Store Connect. Xcode → Product > Scheme > Edit Scheme > Run > Options
  # affichera "Kompta.storekit" déjà sélectionné dans "StoreKit Configuration".
  Kompta:
    build:
      targets:
        Kompta: all
    run:
      config: Debug
      storeKitConfiguration: Kompta.storekit
