# KOMPTA — déploiement production AWS (1 instance Lightsail, le moins cher)
# Caddy (TLS auto) -> frontend (nginx, SPA) -> backend (FastAPI) -> Postgres
#
# Lancer sur l'instance :
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
services:
  postgres:
    image: postgres:16-alpine
    container_name: kompta_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?set in .env.production}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env.production}
      - POSTGRES_DB=${POSTGRES_DB:-kompta}
    volumes:
      - kompta_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Pas de ports exposés : accessible uniquement par le backend sur le réseau interne.

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: kompta_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kompta}
      - SECRET_KEY=${SECRET_KEY:?set in .env.production}
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS:?set in .env.production}
      - PUBLIC_URL=${PUBLIC_URL:?set in .env.production}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - MOMO_CALLBACK_SECRET=${MOMO_CALLBACK_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@kompta.app}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SEED_DEMO=false
    volumes:
      - kompta_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: kompta_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: kompta_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?set in .env.production e.g. app.kompta.com}
      - TLS_EMAIL=${TLS_EMAIL:?set in .env.production}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  kompta_postgres:
  kompta_storage:
  caddy_data:
  caddy_config:
