name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          ENVIRONMENT: development
          SEED_DEMO: "true"
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: "sqlite:///./ci_test.db"
        run: pytest -q

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test --if-present

      - name: Build
        env:
          VITE_API_URL: /api
        run: npm run build

  e2e:
    name: E2E — Playwright smoke (base éphémère)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend (base éphémère + seed démo)
        working-directory: backend
        env:
          ENVIRONMENT: development
          SEED_DEMO: "true"
          SECRET_KEY: ci-e2e-secret
          DATABASE_URL: "sqlite:///./e2e.db"
        run: |
          rm -f e2e.db
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8010 > backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8010/api/health && break || sleep 1; done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps + navigateur Chromium
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build + preview frontend (API relative /api → proxy :8010)
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: |
          npm run build
          nohup npx vite preview --port 3000 --host 127.0.0.1 --strictPort > preview.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:3000 && break || sleep 1; done

      - name: Run E2E smoke
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:3000
          CI: "true"
        run: npx playwright test

      - name: Upload rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
