name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          ENVIRONMENT: development
          SEED_DEMO: "true"
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: "sqlite:///./ci_test.db"
        run: pytest -q

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test --if-present

      - name: Build
        env:
          VITE_API_URL: /api
        run: npm run build

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          ENVIRONMENT: development
          SEED_DEMO: "true"
          SECRET_KEY: ci-e2e-secret
          DATABASE_URL: "sqlite:///./e2e.db"
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8010 > backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8010/api/health && break || sleep 1; done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend deps + browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8010/api
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:3001 && break || sleep 1; done

      - name: Run E2E
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:3001
          CI: "true"
        run: npx playwright test
